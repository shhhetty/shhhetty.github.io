<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 300" width="100%" style="height:auto;background:#0d1117;border-radius:8px;font-family:'Segoe UI',system-ui,sans-serif">
<defs>
  <marker id="arr" markerWidth="7" markerHeight="7" refX="3.5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#30363d"/></marker>
  <marker id="arr2" markerWidth="7" markerHeight="7" refX="3.5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#a78bfa"/></marker>
</defs>

<text x="350" y="26" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="600" letter-spacing="1">GPT-4.1-MINI FINE-TUNING PIPELINE</text>

<!-- Step 1: Labeled Dataset -->
<rect x="20" y="44" width="130" height="80" rx="8" fill="#161b22" stroke="#a78bfa" stroke-width="1.4"/>
<text x="85" y="68" text-anchor="middle" fill="#a78bfa" font-size="18">📋</text>
<text x="85" y="88" text-anchor="middle" fill="#e6edf3" font-size="11" font-weight="600">Labeled Dataset</text>
<text x="85" y="103" text-anchor="middle" fill="#8b949e" font-size="9">Historical QA decisions</text>
<text x="85" y="116" text-anchor="middle" fill="#8b949e" font-size="9">formatted as JSONL</text>

<line x1="152" y1="84" x2="172" y2="84" stroke="#30363d" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- Step 2: Fine-Tune API -->
<rect x="174" y="44" width="130" height="80" rx="8" fill="#161b22" stroke="#a78bfa" stroke-width="1.4"/>
<text x="239" y="68" text-anchor="middle" fill="#a78bfa" font-size="18">⚡</text>
<text x="239" y="88" text-anchor="middle" fill="#e6edf3" font-size="11" font-weight="600">Fine-Tune API</text>
<text x="239" y="103" text-anchor="middle" fill="#8b949e" font-size="9">OpenAI supervised</text>
<text x="239" y="116" text-anchor="middle" fill="#8b949e" font-size="9">fine-tuning job</text>

<line x1="306" y1="84" x2="326" y2="84" stroke="#30363d" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- Step 3: Fine-Tuned Model -->
<rect x="328" y="44" width="130" height="80" rx="8" fill="#161b22" stroke="#a78bfa" stroke-width="1.4"/>
<text x="393" y="68" text-anchor="middle" fill="#a78bfa" font-size="18">🧠</text>
<text x="393" y="88" text-anchor="middle" fill="#e6edf3" font-size="11" font-weight="600">Fine-Tuned Model</text>
<text x="393" y="103" text-anchor="middle" fill="#8b949e" font-size="9">GPT-4.1-mini · ~90%</text>
<text x="393" y="116" text-anchor="middle" fill="#8b949e" font-size="9">human agreement</text>

<line x1="460" y1="84" x2="480" y2="84" stroke="#30363d" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- Step 4: Batch Inference -->
<rect x="482" y="44" width="130" height="80" rx="8" fill="#161b22" stroke="#a78bfa" stroke-width="1.4"/>
<text x="547" y="68" text-anchor="middle" fill="#a78bfa" font-size="18">🚀</text>
<text x="547" y="88" text-anchor="middle" fill="#e6edf3" font-size="11" font-weight="600">Batch Inference</text>
<text x="547" y="103" text-anchor="middle" fill="#8b949e" font-size="9">50-worker parallel</text>
<text x="547" y="116" text-anchor="middle" fill="#8b949e" font-size="9">ThreadPoolExecutor</text>

<!-- Two model tracks -->
<rect x="20" y="152" width="320" height="70" rx="8" fill="#161b22" stroke="#6366f1" stroke-width="1.2"/>
<text x="30" y="172" dominant-baseline="middle" fill="#6366f1" font-size="10" font-weight="700">MODEL A</text>
<text x="90" y="172" dominant-baseline="middle" fill="#e6edf3" font-size="10" font-weight="600">Sensicality Classifier</text>
<text x="30" y="191" fill="#8b949e" font-size="9">Does this keyword make a valid CLP title?</text>
<text x="30" y="206" fill="#8b949e" font-size="9">Verticals: fashion · footwear · electronics</text>

<rect x="360" y="152" width="320" height="70" rx="8" fill="#161b22" stroke="#818cf8" stroke-width="1.2"/>
<text x="370" y="172" dominant-baseline="middle" fill="#818cf8" font-size="10" font-weight="700">MODEL B</text>
<text x="430" y="172" dominant-baseline="middle" fill="#e6edf3" font-size="10" font-weight="600">Duplicate Classifier</text>
<text x="370" y="191" fill="#8b949e" font-size="9">Do two keywords share the same search intent?</text>
<text x="370" y="206" fill="#8b949e" font-size="9">FAISS pre-filter → model classification</text>

<!-- Connector lines from step 4 down to model tracks -->
<line x1="547" y1="124" x2="547" y2="140" stroke="#a78bfa" stroke-width="1" stroke-dasharray="3,2"/>
<line x1="547" y1="140" x2="180" y2="140" stroke="#a78bfa" stroke-width="1" stroke-dasharray="3,2"/>
<line x1="180" y1="140" x2="180" y2="152" stroke="#a78bfa" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arr2)"/>
<line x1="547" y1="140" x2="520" y2="140" stroke="#a78bfa" stroke-width="0" stroke-dasharray="3,2"/>
<line x1="520" y1="140" x2="520" y2="152" stroke="#a78bfa" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arr2)"/>

<!-- Tech tag -->
<rect x="20" y="240" width="660" height="22" rx="5" fill="#161b22" stroke="#30363d" stroke-width="1"/>
<text x="350" y="252" text-anchor="middle" fill="#8b949e" font-size="9">Python · OpenAI Fine-Tuning API · GPT-4.1-mini · Pandas · JSONL · ThreadPoolExecutor</text>
</svg>
